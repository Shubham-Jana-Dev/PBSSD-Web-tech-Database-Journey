<html lang="en">
<head>

    <title>Document</title>
    <style>
        body{

            background-size:cover;
            background-repeat:no-repeat;
        }
        .contain{
            height:100vh;
            width:100vw;
            margin:auto;
            border: 2px solid blue;
            background-color:rgb(255, 255, 255);
            display:flex;
            flex-direction:row;
        }
        #q1{
            display:flex;
            align-items:center;
            justify-content:center;
            background-color:blueviolet;
        }
        #q2{
            display:flex;
            align-items:center;
            justify-content:center;
            background-color:blueviolet;
        }
        #q3{
            display:flex;
            align-items:center;
            justify-content:center;
            background-color:blueviolet;
        }
        #q4{
            display:flex;
            align-items:center;
            justify-content:center;
            background-color:blueviolet;
        }
        #q5{
            display:flex;

            justify-content:center;
            background-color:blueviolet;
        }
        .item{
            height:80px;
            width:20%;
            /* border:3px solid red; */
        }
        @media (max-width:750px){
            .contain{
            height:100%;
            width:100%;
            flex-direction:column;
            background:url("https://www.whoa.in/download/cool-funny-images-mobile-wallpapers-hd-wallpapers-for-mobiles-2--mobile-wallpaper");
            background-size:cover;
             background-repeat:no-repeat;
        }
        .item{

        }
    }
    h3{
        font-size:large;

    button{

        color:rgb(187, 0, 255);

    }

</head> 

<body>
    <div class="contain">
        <div class="item" id="q1"><h3>Home</h3></div>
