    <style>
        body{
            display:flex;
            justify-content:center;
             align-items:center; 
        }
        .roter{
            height:400px;
            width:400px;
            border:0.5px solid rgb(205, 101, 101);
            border-radius:50%;
            animation-name: fan;
            animation-duration: 1s;
            animation-iteration-count: infinite;       
            animation-timing-function: linear;
            display: grid;
            grid-template-rows: repeat(2, 2fr);
            grid-template-columns: repeat(2,2fr);
            align-items: center;
            text-align:center;
        }
        
    .blade1{
        width:200px;
        height:5vh;
        border-radius:50%;
        border:2px solid black;
        align-items:center; 
    }
    .maic{
        width:600px;
        height:600px;
        border:2px solid rgb(230, 226, 226);
        border-radius:50%;
        align-items:center;
    }
    .blade2{
        width:200px;
        height:5vh;
        border-radius:50%;
        border:2px solid black;

    }
    .blade3{
        width:200px;
        height:5vh;
        border-radius:50%;
        border:2px solid black;
    }
    .blade4{
        width:200px;
        height:5vh;
        border-radius:50%;
        border:2px solid black;
    }
    .p1{
        transform:rotate(45deg);
        align-items:center;
        background:linear-gradient( black, white);
        
    }
    .p4{
        transform:rotate(45deg);
        gap:0px;
        
        background:linear-gradient( black, white);
    }
    .p2{
        transform:rotate(-45deg);
        gap:0px;
        background:linear-gradient( black, white);
    }
    .p3{
        transform:rotate(-45deg);
        gap:0px;
        background:linear-gradient( black, white);
    }
        @keyframes fan{
            from{
                transform:rotate(0deg);
            }
            to{
                transform:rotate(360deg);

            }
        }
