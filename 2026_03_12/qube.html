<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height: 100vh;
            background:#f0f0f0;
        }
        .mainview{
            height:200px;
            width:200px;
            perspective:600px;
        }
        .container{
            height:100%;
            width:100%;
            position:relative;
            transform-style: preserve-3d;
            animation: ro 5s infinite linear;

        }
        .item1{
            transform:rotateY(0deg) translateZ(100px); 
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgb(255, 0, 0);
            border: 2px solid #000;
        }
        .item2{
            transform:rotateY(90deg) translateZ(100px); 
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgb(13, 0, 255);
            border: 2px solid #000;
        }
        .item3{
            
            transform:rotateY(180deg) translateZ(100px); 
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgb(255, 255, 255);
            border: 2px solid #000;
        }
        .item4{
            transform:rotateY(-90deg) translateZ(100px); 
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgb(55, 255, 0);
            border: 2px solid #000;
        }
        .item5{
            transform:rotateX(90deg) translateZ(100px); 
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgb(255, 81, 0);
            border: 2px solid #000;
        }
        .item6{
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgb(246, 255, 0);
            border: 2px solid #000;
            transform:rotateX(-90deg) translateZ(100px); 
        }
         @keyframes ro {
            from{
                transform:rotateX(0deg) rotateY(0deg);
            }
            to{
                transform:rotateX(360deg) rotateY(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="mainview">
        <div class="container">
            <div class="item1">1</div>
            <div class="item2">2</div>
            <div class="item3">3</div>
            <div class="item4">4</div>
            <div class="item5">5</div>
            <div class="item6">6</div>
       </div> 
    </div>
</body>
</html>
