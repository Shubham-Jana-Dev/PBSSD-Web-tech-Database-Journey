<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0px;
            padding:0px;
            display:flex;
            justify-content:center;
            align-items:center;
            
        }
        .container{
            margin-top:10%;
            height:300px;
            width:300px;
            background:2px solid black;
            background:rgb(255, 255, 255);
            align-items:center;
            display:flex;
            justify-content:center;
            perspective: 400px;
            perspective-origin:top,left;
        }
        .item1{
            
            height:200px;
            width:1200px;
            background:2px solid black;
            background:rgb(206, 228, 12);
            transform:perspective(900px),rotateX(60deg);
            /* transform:perspective(400px),rotateY(65deg); */
            /* transform:perspective(900px),rotateZ(6deg); */
            position:relative;
            transform:skew(0deg);
        }
        .item2{
            height:200px;
            width:200px;
            background:2px solid black;
            background:rgb(85, 192, 39);
            transform:perspective(900px),rotateX(60deg);
            /* transform:perspective(400px),rotateY(65deg); */
            /* transform:perspective(900px),rotateZ(6deg); */
            position:relative;
            transform:skew(45deg);
        }
        .item3{
            height:200px;
            width:200px;
            background:2px solid black;
            background:rgb(192, 110, 39);
            transform:perspective(90px),rotateX(60deg);
            /* transform:perspective(400px),rotateY(65deg); */
            /* transform:perspective(900px),rotateZ(6deg); */
            transform:skew(0deg);
        }
        .item4{
            height:200px;
            width:200px;
            background:2px solid black;
            background:rgb(47, 34, 98);
            transform:perspective(900px),rotateX(60deg);
            /* transform:perspective(400px),rotateY(65deg); */
            /* transform:perspective(900px),rotateZ(6deg); */
            position:relative;
            transform:skew(45deg);
        }
        .item5{
            height:200px;
            width:200px;
            background:2px solid black;
            background:rgb(227, 22, 186);
            transform:perspective(900px),rotateX(60deg);
            /* transform:perspective(400px),rotateY(65deg); */
            /* transform:perspective(900px),rotateZ(6deg); */
            position:relative;
            transform:skew(45deg);
        }
        .item6{
            margin-top: 200px;
            height:200px;
            width:1400px;
            background:2px solid black;
            background:rgb(25, 189, 156);
            transform:perspective(900px),rotateX(60deg);
            /* transform:perspective(400px),rotateY(65deg); */
            /* transform:perspective(900px),rotateZ(6deg); */
            position:relative;
            transform:skew(0deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item1"></div>
        <div class="item2"></div>
        <div class="item3"></div>
        <div class="item4"></div>
        <div class="item5"></div>
        <div class="item6"></div>

        
    </div>
</body>
</html>
