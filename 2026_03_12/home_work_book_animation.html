<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipping Book</title>
    <style>
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:rgb(1, 0, 0);
        }
        .mainview{
            height: 100vh;
            width: 100vw;
            perspective: initial;
               }
        .outside{
            height:100%;
            width:100%;
            position:relative;
            transform-style: preserve-3D;
            animation: flip 5s 1 linear;
            transform:rotateX(100deg) rotateY(20deg)
        }
        .page{
            height:250vh;
            width:400px;
            position:absolute;
            background:linear-gradient(90deg,white, black);
            border:0.9px solid black;
        }

        .mainp{
            width:800px;
            background:none;
            display:flex; 
            animation-name: fip-page;
            animation-duration: 1s;
            animation-iteration-count: infinite;
            animation-direction: normal;
            animation-timing-function: ease-in-out;
        }
        #p1{
            animation-delay:1s;
        }
        #p2{
            animation-delay:0.9s;
        }
        #p3{
            animation-delay: 0.8s;
        }
        #p4{
            animation-delay: 0.7s;
        }
        #p5{
            animation-delay: 0.6s;
        }
        #p6{
            animation-delay: 0.5s;
        }
        #p7{
            animation-delay: 0.4s;
        }
        #p8{
            animation-delay: 0.2s;
        }
        #p9{
            animation-delay: 0.1s;
        }
        #p10{
            animation-delay: 0s;
        }
        @keyframes fip-page {
             from{
                transform:rotateY(170deg) translateZ(0px)
            }
            to{
                transform:rotateY(360deg) translateZ(0px)
            }
        } 
        .right{
            height:250vh;
            width:400px;
            background:linear-gradient(90deg,rgb(114, 19, 19), black);
            position:absolute;
            transform:rotateY(170deg) translateZ(36px) translateX(-397.5px); 
        }
        .back{
            height:250vh;
            width:400px;
            background:linear-gradient(90deg,rgb(114, 19, 19), black);
            position:absolute;
            transform:rotateY(0deg) translateZ(0px); 
        }
       
        .outside{
            margin-top: 15vh;
            margin-left: 6vw;
            transition: rotateX(40deg) rotateY(-90deg) 
            
        }

        @keyframes fl-ip{
            from{
                /* transition: rotateX(40deg) rotateY(-30deg); */
                translate: -50%;
            }
            to{
                /* transition: rotateX(-40deg) rotateY(30deg); */
                translate:  25% ;
            }
        } 
    </style>
</head>
<body>
    <div class="mainview">
        <div class="outside">
            <div class="mainp" id="p1">
                <div class="page" id="f1" ></div>
            </div>
            <div class="mainp" id="p2">
                <div class="page" id="f2"></div>    
            </div>
            <div class="mainp" id="p3">

            <div class="mainp" id="p7">

            </div>
            <div class="mainp" id="p8">
                <div class="page" id="f8"></div>    
            </div>
            <div class="left"> </div>
            <div class="back"></div>
            <div class="top"></div>
            <!-- <div class="coverright"> -->
            <div class="right"></div>
            <div class="bottom"></div>
        </div>
    </div>
