<!DOCTYPE html>

    <style>
        * {
            font-family: "Gill Sans", sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: rgb(255, 82, 0);
        }

        .side_2 {
            margin-top: 11vh;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: space-around;

            z-index: -100;
            gap: 60vw;

        }

        .left_img {
            height: 800px;
            width: 400px;
            background: url("assets/Veggies_new.png.avif");

        }

            width: 400px;
            background: url("assets/Sushi_replace.png.avif");

        }

        .navbar {

            padding-top: 60px;

            /* width:  */
        }

        .logo {
            height: 6.7vh;
            width: 12vw;
            background: url("assets/swiggy_logo_white.png.avif");
            background-size: cover;

        }

        .nav_right {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        h5 {
            font-size: x-large;
            color: white;
        }

        .ga {
            height: 70px;

            border: 1px solid white;

            color: white;

        .sin {

            justify-content:center;
            
            /* position:absolute; */
            /* z-index:-8; */
        }
        .main_text{
            text-align:center;
            color:white;
            font-size:70px;

            /* z-index:-8; */
        }
        .search_boxes{
            display:flex;
            justify-content:center;
            align-items:center;
            position:absolute;
            margin-top:35vh;
            gap:20px;
        }
        .location{
            display:flex;
            justify-content:center;
            align-items:center;
        }
        #i_l{
            position:relative;
            z-index:-8;
            left:50px;
            height:30px;
            width:30px;
            color:rgb(255, 82, 0);

        #i_s{
            position:relative;
            z-index: -8;
            height:25px;
            width: 25px;
            right:60px;
            color:rgb(151, 145, 145);
        }
        input{
        
            height:80px;
            font-size:x-large;
            border:2px solid rgb(208, 204, 204);
            border-radius:20px;
            position:relative;
            z-index:-9;
        }
        #loc_input{
            width:400px;
        }
        #search_input{
            width:600px;
            position:relative;
            z-index: -9;
        }
        .search{

            justify-content:center;
            align-items:center;
        }
        .loc-icon{
            margin-left:100px;
            color:rgb(5, 3, 2);

<div class="side_2">
